name: Build_ECG_App
on: [workflow_dispatch] # 手动触发打包

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        # 这里加入了 yes | 指令，强行给所有弹出窗口回复 "y" (同意协议)
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECG-App-Package
          path: bin/*.apk
