name: Build_ECG_App
on: [workflow_dispatch] # 手动触发打包

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer
        run: buildozer android debug
        # 这一步会跑很久，大约 15-20 分钟

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECG-App-Package
          path: bin/*.apk
