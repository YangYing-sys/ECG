name: Build ECG APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache \
            libltdl-dev libsqlite3-dev libusb-1.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # 限定 cython 版本，这是 kivy 编译安卓必须的
          pip install buildozer cython==0.29.33

      - name: Build with Buildozer (Auto YES)
        run: |
          # 第一重保障：动态向你的 buildozer.spec 中强制注入“同意安装许可”的指令
          sed -i 's/\[app\]/\[app\]\nandroid.accept_sdk_license = True/' buildozer.spec
          
          # 第二重保障：利用管道传 "y"，强行通过它在后台弹出的任何 (y/N) 确认提示
          set +o pipefail
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECG-APK
          path: bin/*.apk
