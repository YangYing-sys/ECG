name: Build APK
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev libatlas-base-dev gfortran liblapack-dev libblas-dev
          # 必须显式安装 Cython 和 virtualenv
          pip3 install --user --upgrade "buildozer>=1.5.0" "Cython<3.0" virtualenv

      - name: Build with Buildozer
        run: |
          # 增加这一行，防止 NDK 编译时找不到低版本动态库的软链接
          sudo ln -s /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
          
          # 开始打包
          buildozer -v android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECG_Monitor_APK
          path: bin/*.apk
