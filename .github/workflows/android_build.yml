name: Build ECG APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache \
            libltdl-dev libsqlite3-dev libusb-1.0-0 wget

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.33

      - name: Install Android command line tools (Fixed Path Issue)
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          # 加上 -q 安静模式，防止长串下载日志卡死 GitHub 界面
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          # 关键修复：先改名为 latest，再装进新建的 cmdline-tools 文件夹，完美避开层级冲突
          mv cmdline-tools latest
          mkdir cmdline-tools
          mv latest cmdline-tools/

      - name: Set Android SDK environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Auto-accept Android SDK licenses and install base tools
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;34.0.0"
          
          # 【双保险】为了防止 Buildozer 傲娇非要在自己的内建目录里找许可证，直接硬拷贝一份过去
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          cp -r $HOME/android-sdk/licenses $HOME/.buildozer/android/platform/android-sdk/ || true

      - name: Build with Buildozer
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECG-APK
          path: bin/*.apk
