name: Build Kivy ECG App
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies
        run: |
          sudo apt update && sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
      - name: Build APK
        run: |
          echo "android.ndk = 25b" >> buildozer.spec
          echo "android.sdk = 33" >> buildozer.spec
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ecg-monitor-apk
          path: bin/*.apk
